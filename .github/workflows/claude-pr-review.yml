# Claude reviews every PR. See lrok.io-web-app for the design rationale.
#
# Setup:
#   gh secret set ANTHROPIC_API_KEY --repo orcs-to/lrok.io-cli

name: claude-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this Go CLI pull request as a senior engineer who
            already knows the codebase. Post a single review comment.

            Cover, in order:
            1. Correctness — anything that breaks the agent or its
               control-plane handshake (yamux, TLS, retry logic).
            2. Security — token handling, config-file permissions
               (~/.lrok/config), TLS verification in non-insecure
               mode, command injection in shell-out paths.
            3. Cross-platform — Windows path handling, atomic file
               replace, signal handling, terminal-color support.
            4. UX — CLI output (concise, copy-pastable), error
               messages that say what to do next, exit codes.
            5. Tests — does this change have one?

            Skip sections with nothing to flag. If clean, say
            "Looks good — no blockers" and stop. Use file_path:line_number
            for every reference.
          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(go build:*),Bash(go vet:*),Bash(go test:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
